worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # tmp директории (важно для read_only)
  client_body_temp_path /tmp/client_temp;
  proxy_temp_path       /tmp/proxy_temp;
  fastcgi_temp_path     /tmp/fastcgi_temp;
  uwsgi_temp_path       /tmp/uwsgi_temp;
  scgi_temp_path        /tmp/scgi_temp;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;

  sendfile on;
  keepalive_timeout 65;

  # rate limit zones
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
  limit_req_zone $binary_remote_addr zone=health_limit:10m rate=100r/s;

  # возвращаем 429 при превышении
  limit_req_status 429;

  server {
    listen 80;
    server_name localhost;

    # health endpoint (без строгого лимита)
    location /health {
      limit_req zone=health_limit burst=20 nodelay;
      proxy_pass http://rate-limiter:3000/;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # API через rate limiter
    location /api/ {
      proxy_pass http://rate-limiter:3000;

      proxy_http_version 1.1;
      proxy_set_header Connection "";

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}
    # всё остальное
    location / {
      proxy_pass http://rate-limiter:3000/;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}